<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="360" height="120" viewBox="0 0 360 120" role="img" aria-label="BAMPS-ML logo (dose response)">
  <defs>
    <style>
      .bg { fill:#000; }
      .stroke { fill:none; stroke-linecap:square; stroke-linejoin:miter; }
      .w { stroke:#fff; }
      .r { stroke:#B23A48; }
    </style>
  </defs>

  <rect class="bg" x="6" y="6" width="348" height="108"/>
  <rect class="stroke w" x="14" y="14" width="332" height="92" stroke-width="2"/>

  <!-- MIC ladder -->
  <g>
    <rect x="88" y="72" width="24" height="20" fill="#fff"/>
    <rect x="120" y="64" width="24" height="28" fill="#fff"/>
    <rect x="152" y="56" width="24" height="36" fill="#fff"/>
    <rect x="184" y="48" width="24" height="44" fill="#B23A48"/>
    <rect x="216" y="40" width="24" height="52" fill="#B23A48"/>
    <rect x="248" y="32" width="24" height="60" fill="#B23A48"/>
  </g>

  <!-- Threshold line -->
  <path class="stroke w" d="M72 48 H296" stroke-width="3" opacity="0.8"/>

  <!-- Axis ticks -->
  <g opacity="0.6">
    <path class="stroke w" d="M72 96 H72 V100"/>
    <path class="stroke w" d="M296 96 H296 V100"/>
  </g>
</svg>
